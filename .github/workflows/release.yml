name: Release
run-name: Release conductorquantum-python v${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.5)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: conductorquantum-pypi-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Set up python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11.13

      - name: Check if already published
        id: pypi-check
        run: |
          python - "${{ inputs.version }}" "$GITHUB_OUTPUT" <<'PY'
          import json, sys, urllib.request
          version = sys.argv[1]
          output_file = sys.argv[2]
          skip = "false"
          try:
              with urllib.request.urlopen("https://pypi.org/pypi/conductorquantum/json") as r:
                  releases = json.load(r).get("releases", {})
              if version in releases and len(releases[version]) > 0:
                  print(f"Version {version} already on PyPI; skipping publish.")
                  skip = "true"
          except Exception as e:
              print(f"::warning::PyPI version check failed: {e}")
          with open(output_file, "a") as f:
              f.write(f"skip={skip}\n")
          PY

      - name: Bootstrap poetry
        run: |
          curl -sSL https://install.python-poetry.org | python - -y --version 1.5.1

      - name: Update version in pyproject.toml
        run: poetry version "${{ inputs.version }}"

      - name: Update lockfile
        run: poetry lock --no-update

      - name: Install dependencies
        run: poetry install --with dev

      - name: Compile
        run: poetry run mypy .

      - name: Test
        run: poetry run pytest -rP .

      - name: Models integration tests
        run: poetry run pytest tests/custom/test_models_integration.py -v
        env:
          CONTROL_API_TOKEN: ${{ secrets.CONTROL_API_TOKEN }}

      - name: Coda integration tests
        run: poetry run pytest tests/custom/test_coda_integration.py -v
        env:
          CODA_API_TOKEN: ${{ secrets.CODA_API_TOKEN }}

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml poetry.lock
          if git diff --staged --quiet; then
            echo "Version already matches ${{ inputs.version }} on this branch; skipping commit."
          else
            git commit -m "chore: release v${{ inputs.version }}"
            git push origin "HEAD:${{ github.ref_name }}"
          fi

      - name: Create and push git tag
        run: |
          git fetch --tags
          if git rev-parse -q --verify "refs/tags/v${{ inputs.version }}" >/dev/null; then
            echo "Tag v${{ inputs.version }} already exists; skipping."
          else
            git tag "v${{ inputs.version }}"
            git push origin "v${{ inputs.version }}"
          fi

      - name: Publish to pypi
        if: steps.pypi-check.outputs.skip != 'true'
        run: |
          poetry config repositories.remote https://upload.pypi.org/legacy/
          poetry --no-interaction -v publish --build --repository remote --username "$PYPI_USERNAME" --password "$PYPI_PASSWORD"
        env:
          PYPI_USERNAME: ${{ secrets.PYPI_USERNAME }}
          PYPI_PASSWORD: ${{ secrets.PYPI_PASSWORD }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          TAG="v${{ inputs.version }}"
          set +e
          view_stderr=$(gh release view "$TAG" 2>&1 >/dev/null)
          view_rc=$?
          set -e
          if [ "$view_rc" -eq 0 ]; then
            echo "Release $TAG already exists; skipping."
            exit 0
          fi
          if ! printf '%s' "$view_stderr" | grep -qi "release not found\|not found"; then
            echo "gh release view failed unexpectedly: $view_stderr" >&2
            exit "$view_rc"
          fi

          TARGET_SHA=$(git rev-list -n 1 "refs/tags/$TAG")
          gh release create "$TAG" \
            --target "$TARGET_SHA" \
            --title "$TAG" \
            --generate-notes
