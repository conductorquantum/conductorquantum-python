name: ci

on: [push]
jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11.13
      - name: Bootstrap poetry
        run: |
          curl -sSL https://install.python-poetry.org | python - -y --version 1.5.1
      - name: Install dependencies
        run: poetry install --with dev
      - name: Compile
        run: poetry run mypy .
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11.13
      - name: Bootstrap poetry
        run: |
          curl -sSL https://install.python-poetry.org | python - -y --version 1.5.1
      - name: Install dependencies
        run: poetry install --with dev

      - name: Test
        run: poetry run pytest -rP .

  integration-test:
    runs-on: ubuntu-latest
    needs: [compile, test]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11.13
      - name: Bootstrap poetry
        run: |
          curl -sSL https://install.python-poetry.org | python - -y --version 1.5.1
      - name: Install dependencies
        run: poetry install --with dev
      - name: Models integration tests
        run: poetry run pytest tests/custom/test_models_integration.py -v
        env:
          CONTROL_API_TOKEN: ${{ secrets.CONTROL_API_TOKEN }}
      - name: Agents integration tests
        run: poetry run pytest tests/custom/test_agents_integration.py -v
        env:
          CONTROL_API_TOKEN: ${{ secrets.CONTROL_API_TOKEN }}
      - name: Coda integration tests
        run: poetry run pytest tests/custom/test_coda_integration.py -v
        env:
          CODA_API_TOKEN: ${{ secrets.CODA_API_TOKEN }}

  publish:
    needs: [compile, test, integration-test]
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11.13
      - name: Bootstrap poetry
        run: |
          curl -sSL https://install.python-poetry.org | python - -y --version 1.5.1
      - name: Install dependencies
        run: poetry install
      - name: Check if version is already published
        id: pypi
        run: |
          VERSION=$(poetry version -s)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          python - "$VERSION" <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import sys
          import urllib.request

          package = "conductorquantum"
          version = sys.argv[1]

          with urllib.request.urlopen(f"https://pypi.org/pypi/{package}/json") as response:
              releases = json.load(response).get("releases", {})

          already_published = version in releases and len(releases[version]) > 0
          print(f"already_published={'true' if already_published else 'false'}")
          PY
      - name: Publish to pypi
        if: steps.pypi.outputs.already_published != 'true'
        run: |
          poetry config repositories.remote https://upload.pypi.org/legacy/
          poetry --no-interaction -v publish --build --repository remote --username "$PYPI_USERNAME" --password "$PYPI_PASSWORD"
        env:
          PYPI_USERNAME: ${{ secrets.PYPI_USERNAME }}
          PYPI_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
      - name: Skip publish for existing version
        if: steps.pypi.outputs.already_published == 'true'
        run: echo "Version ${{ steps.pypi.outputs.version }} is already available on PyPI; skipping publish."
